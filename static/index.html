<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wiselook Assessment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1a6ed8;
      --blue-dark: #185fa5;
      --blue-bg: #e6f1fb;
      --blue-border: #b5d4f4;
      --surface-0: #f5f5f3;
      --surface-1: #f0f0ee;
      --surface-2: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --text-primary: #1a1a18;
      --text-secondary: #555553;
      --text-muted: #999997;
      --radius: 8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--surface-0);
      color: var(--text-primary);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 1rem 1.5rem;
      background: var(--surface-2);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .header-logo {
      width: 32px;
      height: 32px;
      background: var(--blue);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-logo svg { width: 18px; height: 18px; }
    .header-info { flex: 1; }
    .header-title { font-size: 15px; font-weight: 500; color: var(--text-primary); }
    .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
    .header-badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--blue-bg);
      color: var(--blue-dark);
      border: 0.5px solid var(--blue-border);
    }

    /* ── Progress ── */
    .progress-bar {
      padding: 0.6rem 1.5rem;
      background: var(--surface-1);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .progress-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .progress-track {
      flex: 1;
      height: 3px;
      background: var(--border-strong);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--blue);
      border-radius: 99px;
      transition: width 0.4s ease;
    }
    .progress-dots { display: flex; gap: 5px; align-items: center; }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      transition: background 0.3s;
    }
    .dot-done { background: var(--blue); }
    .dot-active { background: var(--blue); opacity: 0.4; }
    .dot-todo { background: var(--border-strong); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 99px; }

    .msg { display: flex; gap: 10px; max-width: 86%; }
    .msg-ai { align-self: flex-start; }
    .msg-user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      margin-top: 2px;
    }
    .avatar-ai {
      background: var(--blue-bg);
      color: var(--blue-dark);
      border: 0.5px solid var(--blue-border);
    }
    .avatar-user {
      background: var(--surface-1);
      color: var(--text-secondary);
      border: 0.5px solid var(--border-strong);
    }

    .bubble {
      padding: 0.75rem 1rem;
      font-size: 14px;
      line-height: 1.65;
    }
    .bubble-ai {
      background: var(--surface-2);
      border: 0.5px solid var(--border);
      border-radius: 4px 12px 12px 12px;
      color: var(--text-primary);
    }
    .bubble-user {
      background: var(--blue);
      color: #fff;
      border-radius: 12px 4px 12px 12px;
    }

    .msg-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
      padding: 0 2px;
    }
    .msg-user .msg-meta { text-align: right; }

    /* ── Dimension tags ── */
    .dim-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .dim-tag {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 20px;
      border: 0.5px solid;
    }
    .tag-o { background: #e6f1fb; color: #185fa5; border-color: #b5d4f4; }
    .tag-c { background: #eaf3de; color: #3b6d11; border-color: #c0dd97; }
    .tag-e { background: #faeeda; color: #854f0b; border-color: #fac775; }
    .tag-a { background: #fbeaf0; color: #993556; border-color: #f4c0d1; }
    .tag-n { background: #eeedfe; color: #534ab7; border-color: #cecbf6; }

    /* ── Profile card ── */
    .profile-card {
      margin-top: 12px;
      background: var(--surface-0);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      padding: 0.875rem 1rem;
    }
    .profile-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }
    .profile-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 7px;
    }
    .profile-row:last-child { margin-bottom: 0; }
    .profile-dim { font-size: 12px; color: var(--text-secondary); width: 118px; flex-shrink: 0; }
    .profile-track {
      flex: 1;
      height: 4px;
      background: var(--border-strong);
      border-radius: 99px;
      overflow: hidden;
    }
    .profile-fill { height: 100%; border-radius: 99px; }
    .fill-o { background: #378add; }
    .fill-c { background: #639922; }
    .fill-e { background: #ba7517; }
    .fill-a { background: #d4537e; }
    .fill-n { background: #7f77dd; }
    .profile-score { font-size: 12px; font-weight: 500; color: var(--text-primary); width: 22px; text-align: right; }

    /* ── Typing indicator ── */
    .typing { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
    .typing span {
      width: 5px;
      height: 5px;
      background: var(--blue);
      border-radius: 50%;
      opacity: 0.3;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    /* ── Input area ── */
    .input-area {
      padding: 0.875rem 1.5rem 1.1rem;
      background: var(--surface-2);
      border-top: 0.5px solid var(--border);
      flex-shrink: 0;
    }
    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface-1);
      border: 0.5px solid var(--border-strong);
      border-radius: 10px;
      padding: 10px 12px;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--blue); }
    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-size: 14px;
      color: var(--text-primary);
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
    }
    textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius);
      background: var(--blue);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .send-btn:hover { background: var(--blue-dark); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 15px; height: 15px; }
    .input-hint { font-size: 11px; color: var(--text-muted); margin-top: 6px; text-align: center; }

    /* ── Completed state ── */
    .completed-banner {
      display: none;
      margin: 0 1.5rem 1rem;
      padding: 0.875rem 1rem;
      background: #eaf3de;
      border: 0.5px solid #c0dd97;
      border-radius: 10px;
      font-size: 13px;
      color: #3b6d11;
      text-align: center;
    }
    .completed-banner.visible { display: block; }

    .profile-panel { display: none; margin: 0 1.5rem 1rem; }
    .profile-panel.visible { display: block; }

    /* ── Start screen ── */
    .start-view {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .start-card {
      max-width: 380px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }
    .start-logo {
      width: 48px;
      height: 48px;
      background: var(--blue);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
    }
    .start-logo svg { width: 26px; height: 26px; }
    .start-title { font-size: 20px; font-weight: 500; color: var(--text-primary); }
    .start-sub { font-size: 14px; color: var(--text-secondary); line-height: 1.55; }
    .start-btn {
      margin-top: 10px;
      padding: 0.7rem 1.7rem;
      border-radius: var(--radius);
      background: var(--blue);
      color: #fff;
      border: none;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .start-btn:hover { background: var(--blue-dark); }
    .start-btn:active { transform: scale(0.97); }

    /* ── Chat view ── */
    .chat-view {
      display: none;
      flex: 1;
      flex-direction: column;
      min-height: 0;
    }
    .chat-view.visible { display: flex; }
  </style>
</head>
<body>

  <!-- Start screen -->
  <div class="start-view" id="start-view">
    <div class="start-card">
      <div class="start-logo">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="6" stroke="white" stroke-width="1.6"/>
          <path d="M6 9.5L8.2 11.5L12 7" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="start-title">Wiselook Assessment</div>
      <p class="start-sub">A short conversation to infer your Big Five personality profile — five questions, a couple of minutes.</p>
      <button class="start-btn" id="start-btn">Start Assessment</button>
    </div>
  </div>

  <!-- Chat view -->
  <div class="chat-view" id="chat-view">

    <!-- Header -->
    <header class="header">
      <div class="header-logo">
        <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="6" stroke="white" stroke-width="1.6"/>
          <path d="M6 9.5L8.2 11.5L12 7" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="header-info">
        <div class="header-title">Wiselook Assessment</div>
        <div class="header-sub">Big Five personality evaluation</div>
      </div>
      <div class="header-badge" id="status-badge">In progress</div>
    </header>

    <!-- Progress -->
    <div class="progress-bar">
      <span class="progress-label" id="progress-label">Question 1 of 5</span>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
      <div class="progress-dots" id="progress-dots"></div>
    </div>

    <!-- Messages -->
    <main class="messages" id="messages"></main>

    <!-- Completed banner -->
    <div class="completed-banner" id="completed-banner">
      Assessment complete
    </div>

    <!-- Final profile card (populated only on completion) -->
    <div class="profile-panel" id="profile-panel"></div>

    <!-- Input -->
    <div class="input-area" id="input-area">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Type your answer…"></textarea>
        <button class="send-btn" id="send-btn" aria-label="Send message">
          <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M7.5 2.5V12M7.5 2.5L3.5 6.5M7.5 2.5L11.5 6.5"
                  stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>

  </div>

<script>
  const DIMENSIONS = ['openness', 'conscientiousness', 'extraversion', 'agreeableness', 'neuroticism'];
  const DIM_LABELS = {
    openness: 'Openness',
    conscientiousness: 'Conscientiousness',
    extraversion: 'Extraversion',
    agreeableness: 'Agreeableness',
    neuroticism: 'Neuroticism',
  };
  const TOTAL = DIMENSIONS.length;

  let sessionId = null;
  let step = 0;
  let done = false;

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');
  const progressFill = document.getElementById('progress-fill');
  const progressLabel = document.getElementById('progress-label');
  const progressDots = document.getElementById('progress-dots');
  const statusBadge = document.getElementById('status-badge');
  const completedBanner = document.getElementById('completed-banner');
  const inputArea = document.getElementById('input-area');

  function renderDots() {
    progressDots.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) {
      const d = document.createElement('div');
      d.className = 'dot ' + (i < step ? 'dot-done' : i === step ? 'dot-active' : 'dot-todo');
      progressDots.appendChild(d);
    }
  }

  function updateProgress() {
    const pct = Math.round((step / TOTAL) * 100);
    progressFill.style.width = pct + '%';
    progressLabel.textContent = done
      ? 'Complete'
      : 'Question ' + (step + 1) + ' of ' + TOTAL;
    renderDots();
  }

  function addMessage(role, html) {
    const msg = document.createElement('div');
    msg.className = 'msg msg-' + role;
    msg.innerHTML = `
      <div class="avatar avatar-${role}">${role === 'ai' ? 'W' : 'P'}</div>
      <div>
        <div class="bubble bubble-${role}">${html}</div>
        <div class="msg-meta">${role === 'ai' ? 'Claire' : 'You'} · just now</div>
      </div>
    `;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function addTyping() {
    const msg = document.createElement('div');
    msg.className = 'msg msg-ai';
    msg.innerHTML = `
      <div class="avatar avatar-ai">W</div>
      <div>
        <div class="bubble bubble-ai">
          <div class="typing"><span></span><span></span><span></span></div>
        </div>
      </div>
    `;
    messagesEl.appendChild(msg);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  function profileCardHTML(profile) {
    if (!profile) return '';
    const rows = DIMENSIONS.filter(d => profile[d]).map(d => ({
      label: DIM_LABELS[d],
      val: profile[d].score,
      cls: 'fill-' + d[0],
    }));
    if (!rows.length) return '';
    return `
      <div class="profile-card">
        <div class="profile-title">Your Big Five Profile</div>
        ${rows.map(r => `
          <div class="profile-row">
            <span class="profile-dim">${r.label}</span>
            <div class="profile-track">
              <div class="profile-fill ${r.cls}" style="width:${(r.val / 5) * 100}%"></div>
            </div>
            <span class="profile-score">${r.val.toFixed(1)}</span>
          </div>
        `).join('')}
      </div>
    `;
  }

  function errorHTML(message) {
    return `<span style="color:#b3261e">${message}</span>`;
  }

  function aiReply(html, delay = 1200) {
    inputEl.disabled = true;
    sendBtn.disabled = true;
    const typing = addTyping();
    return new Promise(resolve => {
      setTimeout(() => {
        typing.remove();
        addMessage('ai', html);
        inputEl.disabled = false;
        sendBtn.disabled = false;
        inputEl.focus();
        resolve();
      }, delay);
    });
  }

  async function startSession() {
    try {
      const res = await fetch('/v1/sessions', { method: 'POST' });
      if (!res.ok) throw new Error('status ' + res.status);
      const data = await res.json();
      sessionId = data.session_id;
      step = DIMENSIONS.indexOf(data.current_dimension);
      updateProgress();
      await aiReply(data.message, 400);
    } catch (err) {
      await aiReply(errorHTML('Could not start the assessment (' + err.message + '). Is the server running with a valid ANTHROPIC_API_KEY?'), 200);
    }
  }

  async function handleSend() {
    if (done || !sessionId) return;
    const text = inputEl.value.trim();
    if (!text) return;
    addMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';

    inputEl.disabled = true;
    sendBtn.disabled = true;
    const typing = addTyping();

    let res;
    try {
      res = await fetch(`/v1/sessions/${sessionId}/reply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ answer: text }),
      });
    } catch (err) {
      typing.remove();
      addMessage('ai', errorHTML('Network error: ' + err.message));
      inputEl.disabled = false;
      sendBtn.disabled = false;
      return;
    }

    typing.remove();

    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      addMessage('ai', errorHTML(errBody.detail || `Something went wrong (${res.status}).`));
      inputEl.disabled = false;
      sendBtn.disabled = false;
      return;
    }

    const data = await res.json();

    if (data.status === 'completed') {
      done = true;
      step = TOTAL;
      updateProgress();
      addMessage('ai', `That's the last question — thanks for taking the time. Your complete Big Five profile is below (confidence: ${Math.round(data.confidence * 100)}%).`);
      const profilePanel = document.getElementById('profile-panel');
      profilePanel.innerHTML = profileCardHTML(data.profile);
      profilePanel.classList.add('visible');
      statusBadge.textContent = 'Complete';
      statusBadge.style.background = '#eaf3de';
      statusBadge.style.color = '#3b6d11';
      statusBadge.style.borderColor = '#c0dd97';
      completedBanner.classList.add('visible');
      inputArea.style.display = 'none';
    } else {
      step = DIMENSIONS.indexOf(data.current_dimension);
      updateProgress();
      addMessage('ai', data.message);
      inputEl.disabled = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  inputEl.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
  });
  sendBtn.addEventListener('click', handleSend);

  // Init
  updateProgress();

  const startView = document.getElementById('start-view');
  const chatView = document.getElementById('chat-view');
  document.getElementById('start-btn').addEventListener('click', () => {
    startView.style.display = 'none';
    chatView.classList.add('visible');
    startSession();
  });
</script>
</body>
</html>
